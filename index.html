
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coro AI Photobooth</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#bc13fe" />
  <link rel="apple-touch-icon" href="https://ufxymelzgxshoopuphoj.supabase.co/storage/v1/object/public/DATA%20COROAI/LOGO/ICON%20S.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: #050505;
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .font-heading { font-family: 'Orbitron', sans-serif; }
    .neon-border {
      box-shadow: 0 0 5px #bc13fe, 0 0 10px #bc13fe;
    }
    .neon-text {
      text-shadow: 0 0 5px #bc13fe, 0 0 10px #bc13fe;
    }
    .glass-card {
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .scan-line {
      width: 100%;
      height: 2px;
      background: #bc13fe;
      position: absolute;
      animation: scan 2s linear infinite;
      z-index: 10;
    }
    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
    }
    ::-webkit-scrollbar-thumb {
      background: #bc13fe44;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #bc13fe;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* DOKU Jokul Customizations to remove double scrollbars */
    #jokul-checkout-wrapper, .jokul-checkout-wrapper {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 999999 !important;
      background: rgba(0, 0, 0, 0.8) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      overflow: hidden !important;
    }

    #jokul-checkout-iframe, iframe[src*="jokul.doku.com"] {
      width: 100% !important;
      height: 100% !important;
      max-height: 100vh !important;
      max-width: 600px !important; /* Make it look like a nice modal on desktop */
      border: none !important;
      border-radius: 16px !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
      overflow: hidden !important;
      margin: auto !important;
    }

    /* Lock body scroll when DOKU is open */
    body.jokul-checkout-open, 
    body:has(iframe[src*="jokul.doku"]), 
    body:has(iframe[src*="sandbox.doku"]),
    body:has(#jokul-checkout-wrapper) {
      overflow: hidden !important;
    }

    @media (max-width: 640px) {
      #jokul-checkout-iframe, iframe[src*="jokul.doku.com"] {
        max-width: 100% !important;
        border-radius: 0 !important;
      }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "google-auth-library": "https://esm.sh/google-auth-library@^10.5.0",
    "@vercel/node": "https://esm.sh/@vercel/node@^5.5.24",
    "openai": "https://esm.sh/openai@^6.16.0",
    "buffer": "https://esm.sh/buffer@^6.0.3",
    "stream": "https://esm.sh/stream@^0.0.3",
    "p-queue": "https://esm.sh/p-queue@^9.1.0"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <!-- DOKU Checkout JS (Sandbox) -->
  <!-- Note: Change to https://jokul.doku.com/jokul-checkout-js/v1/jokul-checkout-1.0.0.js for Production -->
  <script src="https://sandbox.doku.com/jokul-checkout-js/v1/jokul-checkout-1.0.0.js"></script>
  
  <!-- Pemanggilan script utama untuk proses build -->
  <script type="module" src="/index.tsx"></script>
  <script>
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('beforeinstallprompt event fired');
      e.preventDefault();
      window.deferredPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-installable'));
    });
  </script>
</body>
</html>
